version: '3.9'

# ── Staging environment ─────────────────────────────────────────────────────────
# HTTP only (no SSL). API runs migrations automatically on startup.
# Usage: see DEPLOY.md

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: relocation_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [staging]

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_staging:/data
    networks: [staging]

  # ── MinIO ─────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_staging:/data
    ports:
      - "9001:9001"   # MinIO web console (direct access)
    networks: [staging]

  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    restart: "no"
    networks: [staging]
    entrypoint: >
      /bin/sh -c "
      sleep 8;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/relocation-platform;
      mc anonymous set download local/relocation-platform;
      echo 'MinIO bucket ready';
      "

  # ── API (NestJS) — runs prisma migrate deploy on startup ──────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.staging
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/relocation_platform
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CLIENT_URL: http://${SERVER_HOST}
      DEFAULT_LOCALE: en
      SUPPORTED_LOCALES: en,ru
      S3_BUCKET: relocation-platform
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_PUBLIC_URL: http://${SERVER_HOST}:9000/relocation-platform
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks: [staging]

  # ── Web (Next.js) — NEXT_PUBLIC_* baked in at build time ─────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.staging
      args:
        NEXT_PUBLIC_API_URL: http://${SERVER_HOST}/api
        NEXT_PUBLIC_WS_URL: ws://${SERVER_HOST}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on: [api]
    networks: [staging]

  # ── Nginx (HTTP only) ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.staging.conf:/etc/nginx/nginx.conf:ro
    depends_on: [api, web]
    networks: [staging]

volumes:
  postgres_staging:
  redis_staging:
  minio_staging:

networks:
  staging:
    driver: bridge
